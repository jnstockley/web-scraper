---
name: Sync from Python Starter

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    if: ${{ github.repository != 'jnstockley/python-starter' }}
    runs-on: ubuntu-latest
    environment: sync
    name: Sync
    permissions:
      id-token: write  # required for OIDC authentication with Infisical

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          ref: 'dev'
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch external repo and create sync branch
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add external https://github.com/jnstockley/python-starter.git
          git fetch external main
          # Check if there are differences before merging
          if git diff --quiet HEAD external/main; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Merge external main into current branch, allowing conflicts
            git merge external/main --allow-unrelated-histories --no-commit -m "Pull changes from python-starter" || true
            # Stage all files including those with conflicts
            git add -A
            git commit -m "Pull changes from python-starter" || true
          fi

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          domain: "https://secrets.jstockley.com"
          project-slug: ${{ github.event.repository.name }}
          env-slug: "prod"


      - name: Create Pull Request if differences exist
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.GITHUB_TOKEN }}
          base: dev
          title: "Sync from python-starter"
          body: |
            This PR syncs changes from [jnstockley/python-starter](https://github.com/jnstockley/python-starter).
          branch: sync
          delete-branch: true
